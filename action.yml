name: Setup arctl
description: Install and verify the arctl CLI from agentregistry-dev/agentregistry releases

branding:
  icon: package
  color: blue

inputs:
  version:
    description: arctl version to install (without leading v)
    required: false
    default: '0.3.3'
  install-dir:
    description: Directory to install arctl into
    required: false
    default: /usr/local/bin

runs:
  using: composite
  steps:
    - name: Fetch release checksums
      shell: bash
      env:
        ARCTL_VERSION: ${{ inputs.version }}
      run: |
        curl -sSL \
          "https://github.com/agentregistry-dev/agentregistry/releases/download/v${ARCTL_VERSION}/checksums.txt" \
          -o /tmp/arctl-checksums.txt
        cat /tmp/arctl-checksums.txt

    - name: Download arctl binary
      shell: bash
      env:
        ARCTL_VERSION: ${{ inputs.version }}
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        # Normalise arm64 / aarch64
        [ "$ARCH" = "aarch64" ] && ARCH="arm64"
        BINARY="arctl-${OS}-${ARCH}"
        echo "Downloading ${BINARY} v${ARCTL_VERSION}..."
        curl -sSL \
          "https://github.com/agentregistry-dev/agentregistry/releases/download/v${ARCTL_VERSION}/${BINARY}" \
          -o /tmp/arctl
        echo "ARCTL_BINARY=${BINARY}" >> "$GITHUB_ENV"

    - name: Verify checksum
      shell: bash
      run: |
        # Extract the expected checksum for this binary from the release checksums file
        EXPECTED=$(grep "$ARCTL_BINARY" /tmp/arctl-checksums.txt | awk '{print $1}')
        if [ -z "$EXPECTED" ]; then
          echo "Error: checksum not found for $ARCTL_BINARY in checksums.txt"
          exit 1
        fi
        echo "${EXPECTED}  /tmp/arctl" | sha256sum --check --strict
        echo "✓ Checksum verified for $ARCTL_BINARY"

    - name: Install arctl
      shell: bash
      env:
        INSTALL_DIR: ${{ inputs.install-dir }}
      run: |
        chmod +x /tmp/arctl
        mv /tmp/arctl "${INSTALL_DIR}/arctl"
        echo "arctl installed to ${INSTALL_DIR}/arctl"
        arctl version
